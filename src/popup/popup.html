<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PSpacer Companion</title>
    <style>
      body { font: 13px/1.4 -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif; margin: 12px; min-width: 320px; }
      h1 { font-size: 14px; margin: 0 0 10px; }
      label { display: block; margin-top: 8px; }
      input { width: 100%; padding: 4px; box-sizing: border-box; }
      .row { display: flex; gap: 8px; }
      .row > * { flex: 1; }
      button { margin-top: 12px; width: 100%; padding: 6px; }
      .hint { color: #666; font-size: 12px; margin-top: 8px; }
    </style>
  </head>
  <body>
    <h1>PSpacer Companion</h1>

    <label><input type="checkbox" id="enabled" /> Enable filtering</label>

    <div class="row">
      <label>
        Page size
        <input id="pageSize" type="number" min="1" step="1" placeholder="200" />
      </label>
      <label>
        Max cycles
        <input id="maxFetchCycles" type="number" min="1" step="1" placeholder="10" />
      </label>
    </div>

    <label>
      Min matched items
      <input id="minItemCount" type="number" min="1" step="1" placeholder="5" />
    </label>

    <button id="save">Save rules</button>
    <div class="hint">Territory, actual parking lot, and parking name filters are set directly on spacer page.</div>
    <div class="hint">Changes apply to open spacer.click tabs automatically (no reload needed).</div>

    <script type="module" src="popup.js"></script>
  </body>
</html>
